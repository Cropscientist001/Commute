  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in oklch,' + color + ' 28%,transparent)\"><\u002Fdiv>' });\n  }\n  accentFor(id) {\n    return id === 'you'\n      ? (this.props.youAccent || 'oklch(0.72 0.12 60)')\n      : (this.props.shivaAccent || 'oklch(0.70 0.13 18)');\n  }\n  initMaps() {\n    if (typeof window.L === 'undefined') { this._raf = requestAnimationFrame(() => this.initMaps()); return; }\n    const L = window.L;\n    ['you', 'shiva'].forEach(id => {\n      if (this._maps[id]) return;\n      const el = document.getElementById('fc-map-' + id);\n      if (!el) return;\n      const P = this.PLACES[id];\n      const accent = this.accentFor(id);\n      const map = L.map(el, { zoomControl: false, attributionControl: false, scrollWheelZoom: false });\n      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 18, minZoom: 3, subdomains: 'abcd' }).addTo(map);\n      L.marker([P.origin.lat, P.origin.lng], { icon: this.pin(accent) }).addTo(map);\n      L.marker([P.dest.lat, P.dest.lng], { icon: this.pin('#3A3127') }).addTo(map);\n      const b = L.latLngBounds([[P.origin.lat, P.origin.lng], [P.dest.lat, P.dest.lng]]);\n      this._bounds[id] = b;\n      map.fitBounds(b, { padding: [30, 30], maxZoom: 14 });\n      this._maps[id] = map;\n      this.drawRoute(id, accent);\n    });\n    setTimeout(() => {\n      const m = this._maps[this.state.tab];\n      if (m) { m.invalidateSize(); if (this._bounds[this.state.tab]) m.fitBounds(this._bounds[this.state.tab], { padding: [30, 30], maxZoom: 14 }); }\n    }, 140);\n  }\n  drawRoute(id, accent) {\n    const L = window.L;\n    const P = this.PLACES[id]; const o = P.origin, d = P.dest;\n    const url = 'https://router.project-osrm.org/route/v1/driving/' + o.lng + ',' + o.lat + ';' + d.lng + ',' + d.lat + '?overview=full&geometries=geojson';\n    fetch(url).then(r => r.json()).then(j => {\n      const rt = j.routes && j.routes[0];\n      if (!rt) throw new Error('no route');\n      const coords = rt.geometry.coordinates.map(c => [c[1], c[0]]);\n      this._route[id] = coords;\n      const map = this._maps[id];\n      L.polyline(coords, { color: accent, weight: 5, opacity: .85, lineCap: 'round', lineJoin: 'round' }).addTo(map);\n      const b = L.latLngBounds(coords); this._bounds[id] = b;\n      if (this.state.tab === id) map.fitBounds(b, { padding: [30, 30], maxZoom: 15 });\n      const dist = id === 'you' ? Math.round(rt.distance / 1609.34) + ' mi' : Math.round(rt.distance / 1000) + ' km';\n      const min = Math.max(1, Math.round(rt.duration / 60));\n      this.setState(s => ({ route: { ...s.route, [id]: { dist, eta: min + ' min', min } } }));\n      this.updatePos(id);\n    }).catch(() => {\n      const coords = [[o.lat, o.lng], [d.lat, d.lng]];\n      this._route[id] = coords;\n      const map = this._maps[id];\n      if (map) L.polyline(coords, { color: accent, weight: 4, opacity: .55, dashArray: '6 9' }).addTo(map);\n      this.updatePos(id);\n    });\n  }\n  updatePos(id) {\n    const map = this._maps[id], coords = this._route[id];\n    if (!map || !coords || !coords.length) return;\n    const frac = this.progressFor(this.state.status[id]);\n    const idx = Math.min(coords.length - 1, Math.max(0, Math.round(frac * (coords.length - 1))));\n    const pos = coords[idx];\n    if (!this._posMarker[id]) this._posMarker[id] = window.L.marker(pos, { icon: this.vehIcon(this.accentFor(id)), zIndexOffset: 1000 }).addTo(map);\n    else this._posMarker[id].setLatLng(pos);\n  }\n\n  /* ---------- weather ---------- */\n  fetchWeather() {\n    [['you', 'fahrenheit'], ['shiva', 'celsius']].forEach(([id, unit]) => {\n      const p = this.PLACES[id].origin;\n      fetch('https://api.open-meteo.com/v1/forecast?latitude=' + p.lat + '&longitude=' + p.lng + '&current=temperature_2m,weather_code&temperature_unit=' + unit)\n        .then(r => r.json()).then(d => {\n          const c = d.current || {};\n          if (c.temperature_2m == null) return;\n          const w = this.wmo(c.weather_code);\n          this.setState(s => ({ weather: { ...s.weather, [id]: { temp: Math.round(c.temperature_2m), unit: unit === 'fahrenheit' ? '°F' : '°C', label: w.label, dot: w.dot } } }));\n        }).catch(() => {});\n    });\n  }\n  wmo(c) {\n    const m = {\n      0: ['Clear', 'oklch(0.80 0.14 80)'], 1: ['Mostly clear', 'oklch(0.80 0.13 80)'], 2: ['Partly cloudy', 'oklch(0.75 0.04 80)'], 3: ['Overcast', 'oklch(0.70 0.02 80)'],\n      45: ['Fog', 'oklch(0.72 0.02 80)'], 48: ['Fog', 'oklch(0.72 0.02 80)'],\n      51: ['Drizzle', 'oklch(0.68 0.10 235)'], 53: ['Drizzle', 'oklch(0.68 0.10 235)'], 55: ['Drizzle', 'oklch(0.68 0.10 235)'],\n      61: ['Rain', 'oklch(0.62 0.12 235)'], 63: ['Rain', 'oklch(0.62 0.12 235)'], 65: ['Heavy rain', 'oklch(0.56 0.13 235)'],\n      71: ['Snow', 'oklch(0.86 0.02 235)'], 73: ['Snow', 'oklch(0.86 0.02 235)'], 75: ['Snow', 'oklch(0.86 0.02 235)'], 77: ['Snow', 'oklch(0.86 0.02 235)'],\n      80: ['Showers', 'oklch(0.62 0.12 235)'], 81: ['Showers', 'oklch(0.62 0.12 235)'], 82: ['Heavy showers', 'oklch(0.56 0.13 235)'],\n      95: ['Storm', 'oklch(0.56 0.14 300)'], 96: ['Storm', 'oklch(0.56 0.14 300)'], 99: ['Storm', 'oklch(0.56 0.14 300)']\n    };\n    const e = m[c] || ['—', '#C9BCA8'];\n    return { label: e[0], dot: e[1] };\n  }\n\n  /* ---------- time helpers ---------- */\n  secsOfDay(tz) {\n    const p = new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }).formatToParts(new Date());\n    const g = t => parseInt(p.find(x => x.type === t).value, 10);\n    return g('hour') * 3600 + g('minute') * 60 + g('second');\n  }\n  fmtTime(tz) {\n    const p = new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true }).formatToParts(new Date());\n    return { t: p.find(x => x.type === 'hour').value + ':' + p.find(x => x.type === 'minute').value, m: p.find(x => x.type === 'dayPeriod').value };\n  }\n  fmtDate(tz) { return new Intl.DateTimeFormat('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' }).format(new Date()); }\n  minToAmPm(min) {\n    min = ((min % 1440) + 1440) % 1440;\n    let h = Math.floor(min / 60), m = min % 60, dp = h < 12 ? 'AM' : 'PM', hh = h % 12; if (hh === 0) hh = 12;\n    return hh + ':' + String(m).padStart(2, '0') + ' ' + dp;\n  }\n  fmtDur(sec) {\n    if (sec < 0) sec = 0;\n    const m = Math.round(sec / 60);\n    if (m < 1) return 'now';\n    if (m < 60) return 'in ' + m + ' min';\n    const h = Math.floor(m / 60), mm = m % 60;\n    return 'in ' + h + 'h' + (mm ? ' ' + mm + 'm' : '');\n  }\n  parseTime(str) {\n    const m = String(str).match(/(\\d{1,2}):?(\\d{2})?\\s*(am|pm)?/i);\n    if (!m) return 9 * 60;\n    let h = parseInt(m[1], 10); const mm = m[2] ? parseInt(m[2], 10) : 0; const ap = (m[3] || '').toLowerCase();\n    if (ap === 'pm' && h < 12) h += 12;\n    if (ap === 'am' && h === 12) h = 0;\n    return h * 60 + mm;\n  }\n  nextBus(tz, every) {\n    const start = 5 * 60 + 30, end = 23 * 60;\n    const nowS = this.secsOfDay(tz), nowM = nowS / 60;\n    let dep;\n    if (nowM < start) dep = start;\n    else { dep = start + Math.ceil((nowM - start) / every) * every; if (dep > end) dep = start + 1440; }\n    let diff = dep * 60 - nowS; if (diff < 0) diff += 86400;\n    return { time: this.minToAmPm(dep), countdown: this.fmtDur(diff), urgent: diff <= 5 * 60 };\n  }\n  leaveBy(tz, arriveStr, driveMin) {\n    const leave = this.parseTime(arriveStr) - driveMin;\n    const nowS = this.secsOfDay(tz);\n    const leaveSec = (((leave % 1440) + 1440) % 1440) * 60;\n    const diff = leaveSec - nowS;\n    return { time: this.minToAmPm(leave), countdown: diff <= 0 ? 'leave now' : this.fmtDur(diff), urgent: diff <= 15 * 60 };\n  }\n  progressFor(s) { return s === 'arrived' ? 1 : s === 'enroute' ? 0.5 : 0.04; }\n  tzOffset(tz) {\n    const d = new Date();\n    const u = new Date(d.toLocaleString('en-US', { timeZone: 'UTC' }));\n    const t = new Date(d.toLocaleString('en-US', { timeZone: tz }));\n    return Math.round((t - u) / 60000);\n  }\n\n  /* ---------- actions ---------- */\n  setStatus(id, val) {\n    this.setState(s => ({ status: { ...s.status, [id]: val } }), () => { try { localStorage.setItem('fc_status', JSON.stringify(this.state.status)); } catch (e) {} });\n  }\n  cycleStatus(id) {\n    const o = ['home', 'enroute', 'arrived'];\n    this.setStatus(id, o[(o.indexOf(this.state.status[id]) + 1) % 3]);\n  }\n  editPhone(id) {\n    const v = window.prompt('Phone number for ' + this.PLACES[id].name + ':', this.state.phones[id]);\n    if (v != null && v.trim()) this.setState(s => ({ phones: { ...s.phones, [id]: v.trim() } }), () => { try { localStorage.setItem('fc_phones', JSON.stringify(this.state.phones)); } catch (e) {} });\n  }\n  onNotes(e) { const v = e.target.value; this.setState({ notes: v }); try { localStorage.setItem('fc_notes', v); } catch (err) {} }\n\n  /* ---------- card builder ---------- */\n  buildCard(id, opts) {\n    const P = this.PLACES[id];\n    const accent = this.accentFor(id);\n    const tint = 'color-mix(in oklch, ' + accent + ' 13%, #FFFCF6)';\n    const w = this.state.weather[id] || {};\n    const r = this.state.route[id] || {};\n    const status = this.state.status[id];\n    const stMap = {\n      home: { label: id === 'shiva' ? 'Waiting for 99A' : 'At home', color: '#9C8E7A' },\n      enroute: { label: 'On the way', color: accent },\n      arrived: { label: 'Arrived', color: 'oklch(0.60 0.11 150)' }\n    };\n    const st = stMap[status];\n    const clean = n => String(n).replace(/[^+\\d]/g, '');\n    const wa = n => String(n).replace(/[^\\d]/g, '');\n    const phone = this.state.phones[id];\n    const otherId = id === 'you' ? 'shiva' : 'you';\n    const otherWa = wa(this.state.phones[otherId]);\n    const leaveBody = id === 'you' ? 'On my way to work 🚗' : 'Heading out on the 99A 🚌';\n    const arriveBody = id === 'you' ? 'Made it to work ✅' : 'Reached the bank ✅';\n\n    let dep;\n    if (opts.dep === 'leave') {\n      const driveMin = r.min || 32;\n      dep = this.leaveBy(P.tz, opts.arriveBy, driveMin);\n      dep.label = 'Leave by';\n      dep.sub = '≈ ' + driveMin + ' min drive · arrive by ' + opts.arriveBy;\n    } else {\n      dep = this.nextBus(P.tz, opts.busEvery);\n      dep.label = 'Next 99A';\n      dep.sub = 'every ' + opts.busEvery + ' min · from Tambaram West';\n    }\n\n    const t = this.fmtTime(P.tz);\n    return {\n      wrap: {\n        display: this.state.tab === id ? 'block' : 'none',\n        '--ac': accent, '--tint': tint,\n        '--wd': w.dot || '#C9BCA8',\n        '--st': st.color,\n        '--pg': Math.round(this.progressFor(status) * 100) + '%',\n        '--dc': dep.urgent ? 'oklch(0.58 0.16 28)' : '#8A7E6C'\n      },\n      name: P.name, role: P.role, city: P.city, tz: P.tzLabel,\n      originName: P.origin.name, destName: P.dest.name,\n      timeT: t.t, timeM: t.m, dateStr: this.fmtDate(P.tz),\n      wTemp: w.temp != null ? (w.temp + (w.unit || '')) : '—',\n      wLabel: w.label || 'Loading weather…',\n      distance: r.dist || P.defDist,\n      eta: r.eta || P.defEta,\n      depMainLabel: dep.label, depTime: dep.time, depCountdown: dep.countdown, depSub: dep.sub,\n      statusLabel: st.label,\n      phone: phone,\n      callHref: 'tel:' + clean(phone),\n      waHref: 'https://wa.me/' + wa(phone),\n      leavingHref: 'https://wa.me/' + otherWa + '?text=' + encodeURIComponent(leaveBody),\n      arrivedHref: 'https://wa.me/' + otherWa + '?text=' + encodeURIComponent(arriveBody),\n      cycleStatus: () => this.cycleStatus(id),\n      markEnroute: () => this.setStatus(id, 'enroute'),\n      markArrived: () => this.setStatus(id, 'arrived'),\n      editPhone: () => this.editPhone(id)\n    };\n  }\n\n  renderVals() {\n    const youA = this.props.youAccent || 'oklch(0.72 0.12 60)';\n    const shivaA = this.props.shivaAccent || 'oklch(0.70 0.13 18)';\n    const arriveBy = this.props.arriveBy || '9:00 AM';\n    const busEvery = this.props.busEvery || 12;\n\n    const diff = this.tzOffset('Asia/Kolkata') - this.tzOffset('America/Indiana/Indianapolis');\n    const ah = Math.floor(Math.abs(diff) / 60), am = Math.abs(diff) % 60;\n    const gap = diff === 0 ? 'Same time zone' : 'Shiva is ' + ah + 'h' + (am ? ' ' + am + 'm' : '') + (diff > 0 ? ' ahead' : ' behind');\n\n    const tabBase = { flex: 1, padding: '12px 0', borderRadius: '15px', fontFamily: 'Nunito', fontWeight: 800, fontSize: '15px', cursor: 'pointer', border: 'none', transition: 'all .2s', display: 'flex', alignItems: 'center', justifyContent: 'center' };\n    const mkTab = (id, ac) => this.state.tab === id\n      ? { ...tabBase, background: ac, color: '#fff', boxShadow: '0 7px 16px color-mix(in oklch, ' + ac + ' 42%, transparent)' }\n      : { ...tabBase, background: '#FFFCF6', color: '#9C8E7A', border: '1px solid #E7DDCB' };\n\n    return {\n      rootStyle: { '--you-ac': youA, '--shiva-ac': shivaA, background: '#F4EBDC', minHeight: '100%', fontFamily: \"'Nunito Sans',system-ui,sans-serif\", color: '#3A3127', WebkitFontSmoothing: 'antialiased' },\n      gap,\n      setTabYou: () => this.setState({ tab: 'you' }),\n      setTabShiva: () => this.setState({ tab: 'shiva' }),\n      youTabStyle: mkTab('you', youA),\n      shivaTabStyle: mkTab('shiva', shivaA),\n      you: this.buildCard('you', { dep: 'leave', arriveBy }),\n      shiva: this.buildCard('shiva', { dep: 'bus', busEvery }),\n      notes: this.state.notes,\n      onNotes: (e) => this.onNotes(e)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
